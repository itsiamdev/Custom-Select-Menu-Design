<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Select Menu Design</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/menu.png" type="image/x-icon">
</head>
<body>
    <div class="hero">
        <div class="selector">
            <div id="selectField">
                <p id="selectText">Select Social Media</p>
                <img src="images/arrow.png" id="arrowIcon">
            </div>
        </div>
        <ul id="list" class="hide">
            <li class="options">
                <img src="images/facebook.png">
                <span>Facebook</span>
            </li>
            <li class="options">
                <img src="images/twitter.png">
                <span>Twitter</span>
            </li>
            <li class="options">
                <img src="images/instagram.png">
                <span>Instagram</span>
            </li>
            <li class="options">
                <img src="images/youtube.png">
                <span>YouTube</span>
            </li>
            <li class="options">
                <img src="images/pinterest.png">
                <span>Pinterest</span>
            </li>
            <li class="options">
                <img src="images/whatsapp.png">
                <span>WhatsApp</span>
            </li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
